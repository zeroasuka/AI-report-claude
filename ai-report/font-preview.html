<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@font-face {
  font-family: 'ZCOOLQingKe';
  src: url('assets/fonts/preview-zcool_qingke_huangyou.woff2') format('woff2');
}
@font-face {
  font-family: 'NotoSerifTC700';
  src: url('assets/fonts/preview-noto_serif_tc_700.woff2') format('woff2');
  font-weight: 700;
}
@font-face {
  font-family: 'NotoSerifTC900';
  src: url('assets/fonts/preview-noto_serif_tc_900.woff2') format('woff2');
  font-weight: 900;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 48px;
  width: 960px;
}
.row { display: flex; flex-direction: column; gap: 8px; }
.label {
  font-family: -apple-system, sans-serif;
  font-size: 12px;
  color: #6e7681;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.text {
  font-size: 80px;
  line-height: 1.1;
  background: linear-gradient(135deg, #a855f7 0%, #60a5fa 50%, #34d399 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
</style>
</head>
<body>
  <div class="row">
    <div class="label">A · ZCOOL QingKe HuangYou（站酷慶科黃油體）— 圓潤手寫感</div>
    <div class="text" style="font-family:'ZCOOLQingKe',serif">言出法隨·幻化成真</div>
  </div>
  <div class="row">
    <div class="label">B · Noto Serif TC 700（思源宋體繁體）— 古典宋體</div>
    <div class="text" style="font-family:'NotoSerifTC700',serif;font-weight:700">言出法隨·幻化成真</div>
  </div>
  <div class="row">
    <div class="label">C · Noto Serif TC 900（思源宋體繁體 Black）— 宋體加重</div>
    <div class="text" style="font-family:'NotoSerifTC900',serif;font-weight:900">言出法隨·幻化成真</div>
  </div>
</body>
</html>
